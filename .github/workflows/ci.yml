name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json
      - name: Install root devDeps (eslint base)
        run: npm ci
      - name: Install site deps
        working-directory: site
        run: npm ci
      - name: Lint
        working-directory: site
        run: npm run lint
      - name: Type-check
        working-directory: site
        run: npx tsc --noEmit
      - name: Test
        working-directory: site
        run: npm test
      - name: Build
        working-directory: site
        run: npm run build

  webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webapp/package-lock.json
      - name: Install root devDeps (eslint base)
        run: npm ci
      - name: Install webapp deps
        working-directory: webapp
        run: npm ci
      - name: Lint
        working-directory: webapp
        run: npm run lint
      - name: Type-check
        working-directory: webapp
        run: npx tsc --noEmit
      - name: Test
        working-directory: webapp
        run: npm test
      - name: Build
        working-directory: webapp
        run: npm run build
